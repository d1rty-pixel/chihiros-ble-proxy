# ── Select ────────────────────────────────────────────────────────────────────
select:
  # Doctor Mate preset profiles (OPTIONAL)
  - platform: template
    name: "Doctor Mate profile"
    id: sel_doctor_profile
    icon: mdi:fish
    restore_value: true
    optimistic: true
    options:
      - "Plant (80 ppm)"
      - "Fish (93 ppm)"
      - "Shrimp (66 ppm)"
      - "Manual"
    initial_option: "Manual"
    on_value:
      # Selecting a profile sets the TDS number, which triggers the BLE update
      - if:
          condition:
            lambda: return x == "Plant (80 ppm)";
          then:
            - number.set:
                id: num_doctor_tds
                value: 80
      - if:
          condition:
            lambda: return x == "Fish (93 ppm)";
          then:
            - number.set:
                id: num_doctor_tds
                value: 93
      - if:
          condition:
            lambda: return x == "Shrimp (66 ppm)";
          then:
            - number.set:
                id: num_doctor_tds
                value: 66

# ── Sensors ───────────────────────────────────────────────────────────────────
sensor:
  # CO2 notification (raw, logged for debugging)
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_co2
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: co2_notification
    name: "CO2 notification"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("co2", "Notification: %s", chihiros::hex_dump(x).c_str());
      if (x.size() >= 7) return (float)x[6];
      return NAN;

  # Light notification (raw, logged for debugging)
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_light
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: light_notification
    name: "Light notification"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("light", "Notification (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      return NAN;

  # Dosing notification (raw, logged for debugging)
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_dosing
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: dosing_notification
    name: "Dosing notification"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("dosing", "Notification (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      return NAN;

  # Fan — live readings (OPTIONAL)
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_fan
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: fan_notification
    name: "Fan notification"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      auto d = chihiros::parse_ventilator_notificatie(x);
      if (d.valid) {
        id(sensor_fan_speed).publish_state(d.fan_speed);
        if (d.kamer_temp > 0.0f && d.kamer_temp < 50.0f) id(sensor_room_temp).publish_state(d.kamer_temp);
        if (d.water_temp > 0.0f && d.water_temp < 50.0f) id(sensor_water_temp).publish_state(d.water_temp);
        id(sensor_humidity).publish_state(d.humidity);
      }
      return NAN;

  - platform: template
    id: sensor_water_temp
    name: "Fan water temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    icon: mdi:thermometer-water

  - platform: template
    id: sensor_room_temp
    name: "Fan air temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:thermometer

  - platform: template
    id: sensor_humidity
    name: "Fan humidity"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0

  - platform: template
    id: sensor_fan_speed
    name: "Fan speed"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:fan

  # Doctor Mate — EC reading (OPTIONAL)
  - platform: ble_client
    type: characteristic
    ble_client_id: chihiros_doctor
    service_uuid: ${ble_service}
    characteristic_uuid: ${ble_rx}
    id: doctor_notification
    name: "Doctor Mate notification"
    notify: true
    internal: true
    unit_of_measurement: ""
    lambda: |-
      ESP_LOGI("doctor", "Notification (%d bytes): %s", (int)x.size(), chihiros::hex_dump(x).c_str());
      if (x.size() >= 6 && x[5] > 0 && x[5] != 0xff) {
        id(sensor_doctor_ec).publish_state((float)x[5]);
      }
      return NAN;

  - platform: template
    id: sensor_doctor_ec
    name: "Doctor Mate EC"
    unit_of_measurement: "µS/cm"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:water-percent
