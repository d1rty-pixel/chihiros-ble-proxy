# ═══════════════════════════════════════════════════════════════════════════════
# Chihiros BLE Proxy — ESPHome config for ESP32-S3
#
# Controls Chihiros aquarium devices via BLE and exposes them to Home Assistant.
# All devices are autonomous: they store their own schedule and run without the
# ESP32. BLE is only needed to push config changes or read sensor data.
#
# Supported devices:
#   CO2 controller  (DYPCO2…)
#   Magnetic stirrer 4-channel  (DYMIX…)
#   WRGB II LED light  (DYNT90…)
#   Dosing pump 4-channel  (DYDOSE…)
#   Cooling fan  (DYNFAN…)     ← OPTIONAL — disable section if not used
#   Doctor Mate  (DYNDOC…)     ← OPTIONAL — disable section if not used
#
# Setup:
#   1. cp secrets.yaml.example secrets.yaml  — fill in WiFi + OTA credentials
#   2. Set the MAC addresses below for your devices (scan with BLE scanner app,
#      or flash this firmware and check logs — unknown Chihiros devices are logged)
#   3. esphome run chihiros-ble-proxy.yaml
# ═══════════════════════════════════════════════════════════════════════════════

substitutions:
  name: chihiros-ble-proxy
  friendly_name: Chihiros BLE Proxy

  # ── Device MAC addresses ───────────────────────────────────────────────────
  # Default: 00:00:00:00:00:00 = auto-discovery.
  # The ESP32 connects to the first Chihiros device of the matching type it finds
  # in BLE advertisements. This works as long as you have at most one device of
  # each type within BLE range.
  # If you have multiple devices of the same type (e.g. two lights), pin the one
  # you want by setting its MAC here. Use scan_ble.py on the host to find MACs.
  co2_mac:      "00:00:00:00:00:00"
  stirrer_mac:  "00:00:00:00:00:00"
  light_mac:    "00:00:00:00:00:00"
  dosing_mac:   "00:00:00:00:00:00"
  fan_mac:      "00:00:00:00:00:00"
  doctor_mac:   "00:00:00:00:00:00"

  # ── Module enable flags ────────────────────────────────────────────────────
  # Set to "false" to disable a module entirely (no BLE connect, no HA entities).
  # A module with MAC = 00:00:00:00:00:00 and enabled = "true" will auto-discover.
  co2_enabled:     "false"
  stirrer_enabled: "true"
  light_enabled:   "true"
  dosing_enabled:  "true"
  fan_enabled:     "true"
  doctor_enabled:  "false"

  # ── Nordic UART Service UUIDs — same for all Chihiros devices ─────────────
  ble_service: "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
  ble_tx:      "6e400002-b5a3-f393-e0a9-e50e24dcca9e"
  ble_rx:      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"

# ── Custom component ──────────────────────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components
    components: [chihiros_ble]

chihiros_ble:

# ── Device base ───────────────────────────────────────────────────────────────
esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_CTRL_BLE_MAX_ACT: "10"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  post_connect_roaming: false
  reboot_timeout: 0s

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    esp32_ble_tracker: DEBUG
    ble_client: DEBUG

api:
  encryption:
    key: !secret encryption_key
  on_client_connected:
    - lambda: id(ha_connected) = true;

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: ntp_time
    timezone: CET-1CEST-2,M3.5.0/02:00:00,M10.5.0/03:00:00
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

esp32_ble:
  io_capability: none
  max_connections: 8

# Scans for Chihiros BLE advertisements.
# Unknown Chihiros devices (not in your MAC list above) are logged so you can
# identify them and fill in their MAC address.
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 60ms
    continuous: true
  on_ble_advertise:
    - then:
        - lambda: |-
            std::string name = x.get_name();
            std::string mac = x.address_str();
            if (name.rfind("DY", 0) != 0) return;
            uint64_t addr = x.address_uint64();
            // Auto-discovery: if a module is enabled but has no MAC configured,
            // adopt the first matching advertisement and connect immediately.
            if (${co2_enabled} && strcmp("${co2_mac}", "00:00:00:00:00:00") == 0 &&
                !id(co2_auto_found) && name.rfind("DYPCO2", 0) == 0) {
                id(chihiros_co2).set_address(addr);
                id(co2_auto_found) = true;
                id(co2_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered CO2 controller: %s", mac.c_str());
                return;
            }
            if (${stirrer_enabled} && strcmp("${stirrer_mac}", "00:00:00:00:00:00") == 0 &&
                !id(stirrer_auto_found) && name.rfind("DYMIX", 0) == 0) {
                id(chihiros_stirrer).set_address(addr);
                id(stirrer_auto_found) = true;
                id(stirrer_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered Stirrer: %s", mac.c_str());
                return;
            }
            if (${light_enabled} && strcmp("${light_mac}", "00:00:00:00:00:00") == 0 &&
                !id(light_auto_found) &&
                (name.rfind("DYNT90", 0) == 0 || name.rfind("DYSIL", 0) == 0)) {
                id(chihiros_light).set_address(addr);
                id(light_auto_found) = true;
                id(light_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered WRGB2 light: %s", mac.c_str());
                return;
            }
            if (${dosing_enabled} && strcmp("${dosing_mac}", "00:00:00:00:00:00") == 0 &&
                !id(dosing_auto_found) && name.rfind("DYDOSE", 0) == 0) {
                id(chihiros_dosing).set_address(addr);
                id(dosing_auto_found) = true;
                id(dosing_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered Dosing pump: %s", mac.c_str());
                return;
            }
            if (${fan_enabled} && strcmp("${fan_mac}", "00:00:00:00:00:00") == 0 &&
                !id(fan_auto_found) && name.rfind("DYNFAN", 0) == 0) {
                id(chihiros_fan).set_address(addr);
                id(fan_auto_found) = true;
                id(fan_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered Fan: %s", mac.c_str());
                return;
            }
            if (${doctor_enabled} && strcmp("${doctor_mac}", "00:00:00:00:00:00") == 0 &&
                !id(doctor_auto_found) && name.rfind("DYNDOC", 0) == 0) {
                id(chihiros_doctor).set_address(addr);
                id(doctor_auto_found) = true;
                id(doctor_connection).turn_on();
                ESP_LOGI("ble_scan", "Auto-discovered Doctor Mate: %s", mac.c_str());
                return;
            }
            // Suppress known device types: either a static MAC is configured, or the device
            // was already auto-discovered. MAC address comparison is intentionally skipped
            // because Chihiros devices use rotating random BLE addresses.
            if (${co2_enabled} && (strcmp("${co2_mac}", "00:00:00:00:00:00") != 0 || id(co2_auto_found)) &&
                name.rfind("DYPCO2", 0) == 0) return;
            if (${stirrer_enabled} && (strcmp("${stirrer_mac}", "00:00:00:00:00:00") != 0 || id(stirrer_auto_found)) &&
                name.rfind("DYMIX", 0) == 0) return;
            if (${light_enabled} && (strcmp("${light_mac}", "00:00:00:00:00:00") != 0 || id(light_auto_found)) &&
                (name.rfind("DYNT90", 0) == 0 || name.rfind("DYSIL", 0) == 0)) return;
            if (${dosing_enabled} && (strcmp("${dosing_mac}", "00:00:00:00:00:00") != 0 || id(dosing_auto_found)) &&
                name.rfind("DYDOSE", 0) == 0) return;
            if (${fan_enabled} && (strcmp("${fan_mac}", "00:00:00:00:00:00") != 0 || id(fan_auto_found)) &&
                name.rfind("DYNFAN", 0) == 0) return;
            if (${doctor_enabled} && (strcmp("${doctor_mac}", "00:00:00:00:00:00") != 0 || id(doctor_auto_found)) &&
                name.rfind("DYNDOC", 0) == 0) return;
            // Log any other Chihiros device so the user can identify and configure it
            const char* type = "Unknown type";
            if      (name.rfind("DYNT90", 0) == 0 || name.rfind("DYSIL", 0) == 0) type = "WRGB2 light       -> set as light_mac";
            else if (name.rfind("DYPCO2", 0) == 0) type = "CO2 controller    -> set as co2_mac";
            else if (name.rfind("DYMIX",  0) == 0) type = "Magnetic stirrer  -> set as stirrer_mac";
            else if (name.rfind("DYNFAN", 0) == 0) type = "Cooling fan       -> set as fan_mac";
            else if (name.rfind("DYNDOC", 0) == 0) type = "Doctor Mate       -> set as doctor_mac";
            else if (name.rfind("DYDOSE", 0) == 0) type = "Dosing pump       -> set as dosing_mac";
            ESP_LOGI("ble_scan", "Chihiros found: %s | MAC=%s RSSI=%d",
              type, mac.c_str(), x.get_rssi());

# ── Globals ───────────────────────────────────────────────────────────────────
globals:
  # HA connection state — only push BLE config while HA is connected
  - id: ha_connected
    type: bool
    restore_value: false
    initial_value: 'false'

  # Light period — shared by CO2 and WRGB2 light
  - id: co2_schedule_enabled
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: co2_device
    type: chihiros::CO2Device
    restore_value: false

  # Stirrer channel on/off state (persisted — survives ESP32 crashes)
  # After a BLE-stack crash the ESP32 restores these from flash so HA sees the
  # correct state even before the next BLE reconnect.
  - id: stirrer_ch0_enabled
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: stirrer_ch1_enabled
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: stirrer_ch2_enabled
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: stirrer_ch3_enabled
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: stirrer_device
    type: chihiros::RoerderDevice
    restore_value: false

  # Light
  - id: light_auto_mode
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: light_device
    type: chihiros::WRGB2Device
    restore_value: false

  # Dosing
  - id: dosing_device
    type: chihiros::DosingDevice
    restore_value: false

  # Fan (OPTIONAL)
  - id: fan_silent_mode
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: fan_device
    type: chihiros::VentilatorDevice
    restore_value: false

  # Doctor Mate (OPTIONAL)
  - id: doctor_device
    type: chihiros::DoctorDevice
    restore_value: false

  # Auto-discovery flags — set when a device is found via BLE scan (no MAC configured).
  # Reset when too many consecutive connection failures occur, enabling re-discovery.
  - id: co2_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: stirrer_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: light_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: dosing_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: fan_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: doctor_auto_found
    type: bool
    restore_value: false
    initial_value: 'false'

  # Consecutive disconnect counters — reset on successful on_connect, incremented on every
  # on_disconnect. A normal connect+send+disconnect cycle increments from 0 to 1 and then
  # resets to 0 on the next successful connect. If on_connect never fires (failed attempt),
  # the counter keeps climbing. At 4 (= 1 intentional + 3 failed) the auto-discovery flag
  # is cleared so the next advertisement triggers fresh discovery.
  - id: co2_connect_fails
    type: int
    restore_value: false
    initial_value: '0'
  - id: stirrer_connect_fails
    type: int
    restore_value: false
    initial_value: '0'
  - id: light_connect_fails
    type: int
    restore_value: false
    initial_value: '0'
  - id: dosing_connect_fails
    type: int
    restore_value: false
    initial_value: '0'
  - id: fan_connect_fails
    type: int
    restore_value: false
    initial_value: '0'
  - id: doctor_connect_fails
    type: int
    restore_value: false
    initial_value: '0'

# ═══════════════════════════════════════════════════════════════════════════════
# LIGHT PERIOD SCHEDULE
# Central timeline that CO2 and the WRGB2 light follow:
#   CO2 on:   light_period_start − co2_pre_start_minutes
#   CO2 off:  light_period_end
#   Light on: light_period_start
#   Light off: light_period_end
# ═══════════════════════════════════════════════════════════════════════════════

script:
  # Update both CO2 and light — staggered to avoid simultaneous BLE connects
  # (simultaneous connects cause HCI 0x07 Memory Full errors)
  - id: schedule_debounce_both
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: co2_connect_if_ready
      - delay: 3000ms
      - script.execute: light_connect_if_ready

  - id: schedule_debounce_co2
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: co2_connect_if_ready

  # ── CO2 scripts ─────────────────────────────────────────────────────────────
  - id: co2_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${co2_enabled} &&
                    (strcmp("${co2_mac}", "00:00:00:00:00:00") != 0 || id(co2_auto_found));
          then:
            - switch.turn_on: co2_connection

  # ── Stirrer scripts ──────────────────────────────────────────────────────────
  - id: stirrer_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${stirrer_enabled} &&
                    (strcmp("${stirrer_mac}", "00:00:00:00:00:00") != 0 || id(stirrer_auto_found));
          then:
            - switch.turn_on: stirrer_connection

  # ── Light scripts ────────────────────────────────────────────────────────────
  - id: light_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${light_enabled} &&
                    (strcmp("${light_mac}", "00:00:00:00:00:00") != 0 || id(light_auto_found));
          then:
            - switch.turn_on: light_connection

  # Only reconnect in manual mode — prevents unnecessary reconnects when sliders change
  - id: light_connect_if_ready_manual
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${light_enabled} && !id(light_auto_mode) &&
                    (strcmp("${light_mac}", "00:00:00:00:00:00") != 0 || id(light_auto_found));
          then:
            - switch.turn_on: light_connection

  - id: light_debounce_manual
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: light_connect_if_ready_manual

  # ── Dosing scripts ───────────────────────────────────────────────────────────
  - id: dosing_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${dosing_enabled} &&
                    (strcmp("${dosing_mac}", "00:00:00:00:00:00") != 0 || id(dosing_auto_found));
          then:
            - switch.turn_on: dosing_connection

  - id: dosing_debounce
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: dosing_connect_if_ready

  # ── Fan scripts ───────────────────────────────────────────────────────────────
  - id: fan_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${fan_enabled} &&
                    (strcmp("${fan_mac}", "00:00:00:00:00:00") != 0 || id(fan_auto_found));
          then:
            - switch.turn_on: fan_connection

  - id: fan_debounce
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: fan_connect_if_ready

  # ── Doctor Mate scripts ───────────────────────────────────────────────────────
  - id: doctor_connect_if_ready
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${doctor_enabled} &&
                    (strcmp("${doctor_mac}", "00:00:00:00:00:00") != 0 || id(doctor_auto_found));
          then:
            - switch.turn_on: doctor_connection

  - id: doctor_debounce
    mode: restart
    then:
      - delay: 1500ms
      - script.execute: doctor_connect_if_ready

# ── Datetime ──────────────────────────────────────────────────────────────────
datetime:
  - platform: template
    id: light_period_start
    name: "Light period start"
    type: time
    optimistic: true
    restore_value: true
    initial_value: "14:00:00"
    icon: mdi:weather-sunset-up
    on_value:
      - script.execute: schedule_debounce_both

  - platform: template
    id: light_period_end
    name: "Light period end"
    type: time
    optimistic: true
    restore_value: true
    initial_value: "21:00:00"
    icon: mdi:weather-sunset-down
    on_value:
      - script.execute: schedule_debounce_both

# ── WRGB2 channel lights ──────────────────────────────────────────────────────
# Each channel (R, G, B) is an independent brightness-only dimmer.
# Turning a channel on/off or adjusting brightness switches to manual mode and
# triggers a BLE write with all three channel levels sent together.
# The float outputs below don't drive any hardware — the channel level is read
# back from the light's current_values when the BLE connection is established
# (see chihiros_light on_connect) — so their write_action is a no-op.
output:
  - platform: template
    id: light_ch_r_output
    type: float
    write_action:
      - lambda: return;

  - platform: template
    id: light_ch_g_output
    type: float
    write_action:
      - lambda: return;

  - platform: template
    id: light_ch_b_output
    type: float
    write_action:
      - lambda: return;

light:
  - platform: monochromatic
    id: light_ch_r
    name: "WRGB2 Red channel"
    output: light_ch_r_output
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual
    on_turn_off:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual

  - platform: monochromatic
    id: light_ch_g
    name: "WRGB2 Green channel"
    output: light_ch_g_output
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual
    on_turn_off:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual

  - platform: monochromatic
    id: light_ch_b
    name: "WRGB2 Blue channel"
    output: light_ch_b_output
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual
    on_turn_off:
      - lambda: id(light_auto_mode) = false;
      - script.execute: light_debounce_manual

# ── BLE clients ───────────────────────────────────────────────────────────────

ble_client:
  # ── CO2 ──
  - mac_address: ${co2_mac}
    id: chihiros_co2
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(co2_connect_fails) = 0;
            id(co2_device).prepare(
              id(ntp_time).now(), id(co2_schedule_enabled),
              id(light_period_start).hour, id(light_period_start).minute,
              id(light_period_end).hour,   id(light_period_end).minute,
              (int)id(co2_pre_start_minutes).state
            );
        - while:
            condition:
              lambda: return id(co2_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("co2", "TX: %s", chihiros::describe_packet(id(co2_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_co2
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(co2_device).next();
              - delay: 200ms
        - switch.turn_off: co2_connection
        - logger.log: "co2: done"
    on_disconnect:
      then:
        - lambda: |-
            id(co2_connect_fails)++;
            if (id(co2_connect_fails) >= 4 && id(co2_auto_found)) {
                id(co2_auto_found) = false;
                ESP_LOGW("co2", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "co2: disconnected"

  # ── Stirrer ──
  - mac_address: ${stirrer_mac}
    id: chihiros_stirrer
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(stirrer_connect_fails) = 0;
            uint8_t uur[]  = {(uint8_t)id(stirrer_ch0_start_hour).state, (uint8_t)id(stirrer_ch1_start_hour).state,
                              (uint8_t)id(stirrer_ch2_start_hour).state, (uint8_t)id(stirrer_ch3_start_hour).state};
            uint8_t min_[] = {(uint8_t)id(stirrer_ch0_start_min).state, (uint8_t)id(stirrer_ch1_start_min).state,
                              (uint8_t)id(stirrer_ch2_start_min).state, (uint8_t)id(stirrer_ch3_start_min).state};
            uint8_t vrlp[] = {(uint8_t)id(stirrer_ch0_lead_time).state, (uint8_t)id(stirrer_ch1_lead_time).state,
                              (uint8_t)id(stirrer_ch2_lead_time).state, (uint8_t)id(stirrer_ch3_lead_time).state};
            uint8_t spd[]  = {(uint8_t)id(stirrer_ch0_speed).state, (uint8_t)id(stirrer_ch1_speed).state,
                              (uint8_t)id(stirrer_ch2_speed).state, (uint8_t)id(stirrer_ch3_speed).state};
            uint8_t dur[]  = {(uint8_t)id(stirrer_ch0_duration).state, (uint8_t)id(stirrer_ch1_duration).state,
                              (uint8_t)id(stirrer_ch2_duration).state, (uint8_t)id(stirrer_ch3_duration).state};
            id(stirrer_device).prepare(
              id(ntp_time).now(), uur, min_, vrlp, spd, dur,
              id(stirrer_ch0_enabled), id(stirrer_ch1_enabled),
              id(stirrer_ch2_enabled), id(stirrer_ch3_enabled)
            );
        - while:
            condition:
              lambda: return id(stirrer_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("stirrer", "TX: %s", chihiros::describe_packet(id(stirrer_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_stirrer
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(stirrer_device).next();
              - delay: 200ms
        - switch.turn_off: stirrer_connection
        - logger.log: "stirrer: done"
    on_disconnect:
      then:
        - lambda: |-
            id(stirrer_connect_fails)++;
            if (id(stirrer_connect_fails) >= 4 && id(stirrer_auto_found)) {
                id(stirrer_auto_found) = false;
                ESP_LOGW("stirrer", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "stirrer: disconnected"

  # ── WRGB2 Light ──
  - mac_address: ${light_mac}
    id: chihiros_light
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(light_connect_fails) = 0;
            uint8_t r, g, b;
            if (id(light_auto_mode)) {
                r = (uint8_t)id(light_schedule_r).state;
                g = (uint8_t)id(light_schedule_g).state;
                b = (uint8_t)id(light_schedule_b).state;
            } else {
                auto cv_r = id(light_ch_r)->current_values;
                r = (uint8_t)(cv_r.get_brightness() * cv_r.get_state() * 100.0f + 0.5f);
                auto cv_g = id(light_ch_g)->current_values;
                g = (uint8_t)(cv_g.get_brightness() * cv_g.get_state() * 100.0f + 0.5f);
                auto cv_b = id(light_ch_b)->current_values;
                b = (uint8_t)(cv_b.get_brightness() * cv_b.get_state() * 100.0f + 0.5f);
            }
            id(light_device).prepare(
              id(ntp_time).now(), id(light_auto_mode),
              id(light_period_start).hour, id(light_period_start).minute,
              id(light_period_end).hour,   id(light_period_end).minute,
              (uint8_t)id(light_ramp).state,
              r, g, b
            );
        - while:
            condition:
              lambda: return id(light_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("light", "TX: %s", chihiros::describe_packet(id(light_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_light
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(light_device).next();
              - delay: 200ms
        - switch.turn_off: light_connection
        - logger.log: "light: done"
    on_disconnect:
      then:
        - lambda: |-
            id(light_connect_fails)++;
            if (id(light_connect_fails) >= 4 && id(light_auto_found)) {
                id(light_auto_found) = false;
                ESP_LOGW("light", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "light: disconnected"

  # ── Dosing pump ──
  - mac_address: ${dosing_mac}
    id: chihiros_dosing
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(dosing_connect_fails) = 0;
            bool    actief[]   = {id(sw_dosing_schedule_p1).state, id(sw_dosing_schedule_p2).state,
                                  id(sw_dosing_schedule_p3).state, id(sw_dosing_schedule_p4).state};
            uint8_t weekdays[] = {(uint8_t)id(num_dosing_weekdays_p1).state, (uint8_t)id(num_dosing_weekdays_p2).state,
                                  (uint8_t)id(num_dosing_weekdays_p3).state, (uint8_t)id(num_dosing_weekdays_p4).state};
            uint8_t uur[]      = {(uint8_t)id(num_dosing_hour_p1).state, (uint8_t)id(num_dosing_hour_p2).state,
                                  (uint8_t)id(num_dosing_hour_p3).state, (uint8_t)id(num_dosing_hour_p4).state};
            uint8_t min_[]     = {(uint8_t)id(num_dosing_min_p1).state, (uint8_t)id(num_dosing_min_p2).state,
                                  (uint8_t)id(num_dosing_min_p3).state, (uint8_t)id(num_dosing_min_p4).state};
            float   vol[]      = {id(num_dosing_vol_p1).state, id(num_dosing_vol_p2).state,
                                  id(num_dosing_vol_p3).state, id(num_dosing_vol_p4).state};
            id(dosing_device).prepare(
              id(ntp_time).now(), actief, weekdays, uur, min_, vol
            );
        - while:
            condition:
              lambda: return id(dosing_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("dosing", "TX: %s", chihiros::describe_packet(id(dosing_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_dosing
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(dosing_device).next();
              - delay: 200ms
        - switch.turn_off: dosing_connection
        - logger.log: "dosing: done"
    on_disconnect:
      then:
        - lambda: |-
            id(dosing_connect_fails)++;
            if (id(dosing_connect_fails) >= 4 && id(dosing_auto_found)) {
                id(dosing_auto_found) = false;
                ESP_LOGW("dosing", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "dosing: disconnected"

  # ─────────────────────────────────────────────────────────────────────────────
  # OPTIONAL: Cooling Fan
  # Set fan_mac above to enable. Leave as 00:00:00:00:00:00 to skip.
  # ─────────────────────────────────────────────────────────────────────────────
  - mac_address: ${fan_mac}
    id: chihiros_fan
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(fan_connect_fails) = 0;
            id(fan_device).prepare(
              id(ntp_time).now(), id(fan_silent_mode),
              (uint8_t)id(num_fan_start_temp).state,
              (uint8_t)id(num_fan_max_temp).state,
              (uint8_t)id(num_fan_speed).state
            );
        - while:
            condition:
              lambda: return id(fan_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("fan", "TX: %s", chihiros::describe_packet(id(fan_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_fan
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(fan_device).next();
              - delay: 200ms
        - delay: 2000ms
        - switch.turn_off: fan_connection
        - logger.log: "fan: done"
    on_disconnect:
      then:
        - lambda: |-
            id(fan_connect_fails)++;
            if (id(fan_connect_fails) >= 4 && id(fan_auto_found)) {
                id(fan_auto_found) = false;
                ESP_LOGW("fan", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "fan: disconnected"

  # ─────────────────────────────────────────────────────────────────────────────
  # OPTIONAL: Doctor Mate (EC/TDS monitor + auto dosing)
  # Set doctor_mac above to enable. Leave as 00:00:00:00:00:00 to skip.
  # ─────────────────────────────────────────────────────────────────────────────
  - mac_address: ${doctor_mac}
    id: chihiros_doctor
    on_connect:
      then:
        - delay: 500ms
        - lambda: |-
            id(doctor_connect_fails) = 0;
            id(doctor_device).prepare(
              id(ntp_time).now(),
              id(num_doctor_tds).state,
              id(num_doctor_volume).state
            );
        - while:
            condition:
              lambda: return id(doctor_device).has_next();
            then:
              - lambda: |-
                  ESP_LOGI("doctor", "TX: %s", chihiros::describe_packet(id(doctor_device).peek()).c_str());
              - ble_client.ble_write:
                  id: chihiros_doctor
                  service_uuid: ${ble_service}
                  characteristic_uuid: ${ble_tx}
                  value: !lambda return id(doctor_device).next();
              - delay: 200ms
        - switch.turn_off: doctor_connection
        - logger.log: "doctor: done"
    on_disconnect:
      then:
        - lambda: |-
            id(doctor_connect_fails)++;
            if (id(doctor_connect_fails) >= 4 && id(doctor_auto_found)) {
                id(doctor_auto_found) = false;
                ESP_LOGW("doctor", "Repeated connection failures — resetting auto-discovery");
            }
        - logger.log: "doctor: disconnected"

# ── Interval ──────────────────────────────────────────────────────────────────
interval:
  # Poll the fan every 5 minutes for temperature/humidity readings.
  # The fan self-regulates; BLE is only needed for monitoring and config.
  - interval: 5min
    then:
      - if:
          condition:
            lambda: return id(ha_connected) && ${fan_enabled} &&
                    (strcmp("${fan_mac}", "00:00:00:00:00:00") != 0 || id(fan_auto_found));
          then:
            - switch.turn_on: fan_connection

